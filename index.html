      "image": "https://t-449.github.io/images/profile_2.jpeg",
      "sameAs": [
        "https://github.com/T-449",
        "https://www.linkedin.com/in/tushin-mallick-0233311a0/",
        "https://scholar.google.com/citations?user=r3AzDT8AAAAJ&hl=en"

    }
    </script>

    <!-- Fonts: combined into one request -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload critical hero background image -->
